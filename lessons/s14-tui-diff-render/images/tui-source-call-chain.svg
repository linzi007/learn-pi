<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">课程代码到 Pi TUI 源码调用链</title>
  <desc id="desc">课程组件通过 Container 进入 TUI，TUI 内部生成新帧并比较旧帧，最后调用内存 Terminal。下半部分展示 Coding Agent 如何把 AgentSessionEvent 转换为组件更新和 requestRender。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 27px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .section { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .node { font: 700 17px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #172033; }
      .desc { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #536076; }
      .badge { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="650" fill="#f8fafc"/>
  <text x="600" y="48" text-anchor="middle" class="title">从课程状态到 Pi TUI 的真实写入链路</text>

  <text x="55" y="95" class="section">本课实际执行</text>
  <line x1="55" y1="106" x2="1145" y2="106" stroke="#cbd5e1" stroke-width="2"/>

  <rect x="55" y="140" width="245" height="135" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <rect x="73" y="156" width="70" height="24" rx="5" fill="#ffedd5"/>
  <text x="108" y="173" text-anchor="middle" class="badge" fill="#c2410c">课程代码</text>
  <text x="177" y="211" text-anchor="middle" class="node">TaskStatusComponent</text>
  <text x="177" y="239" text-anchor="middle" class="desc">render(width) → 完整 string[]</text>

  <rect x="350" y="140" width="220" height="135" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <rect x="368" y="156" width="70" height="24" rx="5" fill="#e2e8f0"/>
  <text x="403" y="173" text-anchor="middle" class="badge" fill="#475569">公开 API</text>
  <text x="460" y="211" text-anchor="middle" class="node">Container.render</text>
  <text x="460" y="239" text-anchor="middle" class="desc">按组件顺序合并文本行</text>

  <rect x="620" y="140" width="245" height="135" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <rect x="638" y="156" width="70" height="24" rx="5" fill="#dbeafe"/>
  <text x="673" y="173" text-anchor="middle" class="badge" fill="#1d4ed8">内部实现</text>
  <text x="742" y="211" text-anchor="middle" class="node">TUI.doRender</text>
  <text x="742" y="239" text-anchor="middle" class="desc">newLines ↔ previousLines</text>

  <rect x="915" y="140" width="230" height="135" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <rect x="933" y="156" width="70" height="24" rx="5" fill="#dcfce7"/>
  <text x="968" y="173" text-anchor="middle" class="badge" fill="#15803d">公开接口</text>
  <text x="1030" y="211" text-anchor="middle" class="node">Terminal.write</text>
  <text x="1030" y="239" text-anchor="middle" class="desc">只记录变化区间缓冲区</text>

  <path d="M300 207 H342" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M570 207 H612" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M865 207 H907" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text x="55" y="345" class="section">Pi Coding Agent 的 interactive mode</text>
  <line x1="55" y1="356" x2="1145" y2="356" stroke="#cbd5e1" stroke-width="2"/>

  <rect x="75" y="400" width="235" height="120" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="192" y="449" text-anchor="middle" class="node">AgentSessionEvent</text>
  <text x="192" y="478" text-anchor="middle" class="desc">message_update / tool update</text>

  <rect x="370" y="400" width="250" height="120" rx="8" fill="#fdf2f8" stroke="#db2777" stroke-width="2"/>
  <text x="495" y="449" text-anchor="middle" class="node">InteractiveMode</text>
  <text x="495" y="478" text-anchor="middle" class="desc">更新对应 message/tool component</text>

  <rect x="680" y="400" width="205" height="120" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="782" y="449" text-anchor="middle" class="node">requestRender()</text>
  <text x="782" y="478" text-anchor="middle" class="desc">合并高频渲染请求</text>

  <rect x="945" y="400" width="200" height="120" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="1045" y="449" text-anchor="middle" class="node">局部终端写入</text>
  <text x="1045" y="478" text-anchor="middle" class="desc">或必要时完整重绘</text>

  <path d="M310 460 H362" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M620 460 H672" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M885 460 H937" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="160" y="565" width="880" height="48" rx="8" fill="#172033"/>
  <text x="600" y="595" text-anchor="middle" style="font: 600 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #ffffff;">Agent 事件只负责改变组件状态；pi-tui 决定终端最终写多少内容</text>
</svg>
