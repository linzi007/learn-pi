<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Pi TUI 差分渲染概览</title>
  <desc id="desc">上一帧和新一帧都包含任务与状态两行，TUI 比较后发现只有状态行变化，因此终端写入只包含新的状态行。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .subtitle { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #536076; }
      .label { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .body { font: 500 18px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #172033; }
      .small { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #536076; }
      .mono-small { font: 600 15px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #334155; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="#f8fafc"/>
  <text x="600" y="48" text-anchor="middle" class="title">Pi TUI：状态变化如何变成一次局部写入</text>
  <text x="600" y="78" text-anchor="middle" class="subtitle">Component 生成完整帧，TUI 在 Terminal.write() 边界减少输出</text>

  <rect x="50" y="115" width="300" height="225" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <rect x="50" y="115" width="300" height="48" rx="8" fill="#e2e8f0"/>
  <path d="M50 155 H350" stroke="#94a3b8" stroke-width="2"/>
  <text x="200" y="146" text-anchor="middle" class="label">上一帧 previousLines</text>
  <rect x="74" y="184" width="252" height="48" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="94" y="215" class="body">任务: 分析代码</text>
  <rect x="74" y="252" width="252" height="48" rx="6" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="94" y="283" class="body">状态: 等待</text>

  <rect x="450" y="115" width="300" height="225" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <rect x="450" y="115" width="300" height="48" rx="8" fill="#dbeafe"/>
  <path d="M450 155 H750" stroke="#64748b" stroke-width="2"/>
  <text x="600" y="146" text-anchor="middle" class="label">新一帧 newLines</text>
  <rect x="474" y="184" width="252" height="48" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="494" y="215" class="body">任务: 分析代码</text>
  <rect x="474" y="252" width="252" height="48" rx="6" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
  <text x="494" y="283" class="body">状态: 完成</text>

  <path d="M350 225 H405 V200 H445" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="400" y="190" text-anchor="middle" class="small">更新状态</text>

  <rect x="825" y="115" width="325" height="225" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="987" y="150" text-anchor="middle" class="label">TUI 帧比较</text>
  <line x1="853" y1="166" x2="1122" y2="166" stroke="#93c5fd"/>
  <circle cx="866" cy="203" r="10" fill="#22c55e"/>
  <text x="890" y="209" class="mono-small">第 0 行相同 → 跳过</text>
  <circle cx="866" cy="251" r="10" fill="#f97316"/>
  <text x="890" y="257" class="mono-small">第 1 行变化 → 写入</text>
  <rect x="852" y="282" width="270" height="38" rx="6" fill="#ffffff" stroke="#60a5fa"/>
  <text x="987" y="307" text-anchor="middle" class="mono-small">变化区间 [1, 1]</text>
  <path d="M750 227 H817" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <path d="M987 340 V398" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="245" y="410" width="710" height="225" rx="8" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
  <rect x="245" y="410" width="710" height="50" rx="8" fill="#ccfbf1"/>
  <path d="M245 452 H955" stroke="#0f766e" stroke-width="2"/>
  <text x="600" y="443" text-anchor="middle" class="label">RecordingTerminal.write(buffer)</text>
  <text x="285" y="493" class="mono-small">CSI 2026 begin</text>
  <rect x="285" y="516" width="630" height="58" rx="6" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
  <text x="315" y="552" class="body">状态: 完成</text>
  <text x="285" y="606" class="mono-small">CSI 2026 end</text>
  <rect x="725" y="585" width="190" height="32" rx="6" fill="#fff7ed" stroke="#fb923c"/>
  <text x="820" y="607" text-anchor="middle" class="small">没有再次写入任务行</text>

  <rect x="145" y="676" width="910" height="48" rx="8" fill="#172033"/>
  <text x="600" y="707" text-anchor="middle" style="font: 600 17px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #ffffff;">完整帧用于比较，变化区间才跨过终端写入边界</text>
</svg>
