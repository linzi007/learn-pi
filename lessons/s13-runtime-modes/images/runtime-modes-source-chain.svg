<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Runtime Modes 课程调用链与 Pi 源码对应关系</title>
  <desc id="desc">课程真实调用公开 parseArgs 和薄教学 router；教学 router 通过虚线对应上游内部 resolveAppMode。上游 main 随后创建一次 AgentSessionRuntime 并分发给公开 adapters。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 27px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .label { font: 700 17px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #172033; }
      .small { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #536076; }
      .badge { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="650" fill="#f8fafc"/>
  <text x="600" y="48" text-anchor="middle" class="title">课程调用链与 Pi Runtime Adapter 源码对应</text>

  <rect x="55" y="120" width="220" height="130" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <rect x="73" y="136" width="70" height="24" rx="5" fill="#ffedd5"/>
  <text x="108" y="153" text-anchor="middle" class="badge" fill="#c2410c">课程输入</text>
  <text x="165" y="190" text-anchor="middle" class="label">argv + TTY</text>
  <text x="165" y="219" text-anchor="middle" class="small">显式普通数据，无真实终端</text>

  <rect x="330" y="120" width="220" height="130" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <rect x="348" y="136" width="70" height="24" rx="5" fill="#dcfce7"/>
  <text x="383" y="153" text-anchor="middle" class="badge" fill="#15803d">公开 API</text>
  <text x="440" y="190" text-anchor="middle" class="label">parseArgs()</text>
  <text x="440" y="219" text-anchor="middle" class="small">Args · messages · fileArgs</text>

  <rect x="605" y="120" width="235" height="130" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <rect x="623" y="136" width="80" height="24" rx="5" fill="#fef3c7"/>
  <text x="663" y="153" text-anchor="middle" class="badge" fill="#a16207">教学薄层</text>
  <text x="722" y="190" text-anchor="middle" class="label">selectAppMode()</text>
  <text x="722" y="219" text-anchor="middle" class="small">复现内部 4 条路由规则</text>

  <rect x="895" y="120" width="250" height="130" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" stroke-dasharray="8 6"/>
  <rect x="913" y="136" width="70" height="24" rx="5" fill="#dbeafe"/>
  <text x="948" y="153" text-anchor="middle" class="badge" fill="#1d4ed8">源码对应</text>
  <text x="1020" y="190" text-anchor="middle" class="label">resolveAppMode()</text>
  <text x="1020" y="219" text-anchor="middle" class="small">Pi main.ts 中的同规则函数</text>

  <path d="M275 185 H322" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M550 185 H597" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M840 185 H887" stroke="#64748b" stroke-width="2" stroke-dasharray="7 6"/>
  <text x="864" y="172" text-anchor="middle" class="small">对应</text>

  <path d="M1020 250 V315 H600 V350" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="395" y="365" width="410" height="84" rx="8" fill="#172033"/>
  <text x="600" y="399" text-anchor="middle" style="font: 700 18px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #ffffff;">createAgentSessionRuntime()</text>
  <text x="600" y="428" text-anchor="middle" style="font: 500 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #cbd5e1;">创建一次，再交给最终 adapter</text>

  <path d="M600 449 V500" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="80" y="515" width="240" height="95" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="200" y="554" text-anchor="middle" class="label">InteractiveMode</text>
  <text x="200" y="582" text-anchor="middle" class="small">公开 adapter</text>

  <rect x="355" y="515" width="240" height="95" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="475" y="554" text-anchor="middle" class="label">runPrintMode</text>
  <text x="475" y="582" text-anchor="middle" class="small">text</text>

  <rect x="630" y="515" width="240" height="95" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="750" y="554" text-anchor="middle" class="label">runPrintMode</text>
  <text x="750" y="582" text-anchor="middle" class="small">json</text>

  <rect x="905" y="515" width="215" height="95" rx="8" fill="#fdf2f8" stroke="#db2777" stroke-width="2"/>
  <text x="1012" y="554" text-anchor="middle" class="label">runRpcMode</text>
  <text x="1012" y="582" text-anchor="middle" class="small">公开 adapter</text>

  <path d="M600 480 H200 V507" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M600 480 H475 V507" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M600 480 H750 V507" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M600 480 H1012 V507" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
