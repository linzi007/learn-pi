<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="670" viewBox="0 0 1000 670" role="img" aria-labelledby="title desc">
  <title id="title">Pi 默认工具管线的两个批次</title>
  <desc id="desc">第一条 assistant 消息只调用慢速和快速查询。Pi 并行执行它们，快速查询先完成，但历史仍按慢速后快速保存。模型读取这一批结果后产生第二条 assistant 消息，串行审计执行，受限查询在 beforeToolCall 被拦截。最后模型产生总结。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#46607a"/></marker>
    <style>
      .title { font: 700 27px system-ui, sans-serif; fill: #17202a; }
      .subtitle { font: 400 16px system-ui, sans-serif; fill: #52616f; }
      .section { font: 700 18px system-ui, sans-serif; fill: #17202a; }
      .label { font: 700 16px system-ui, sans-serif; fill: #17202a; }
      .text { font: 400 15px system-ui, sans-serif; fill: #273746; }
      .small { font: 400 14px system-ui, sans-serif; fill: #405264; }
      .code { font: 600 14px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #1f3b4d; }
      .arrow { stroke: #46607a; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1000" height="670" fill="#f7fafc"/>
  <text x="40" y="46" class="title">默认运行：两个 Tool Call 批次</text>
  <text x="40" y="73" class="subtitle">每一条含 Tool Call 的 assistant message 是一个批次。第一批展示顺序差异，第二批展示审计与拦截。</text>

  <rect x="40" y="103" width="920" height="232" rx="8" fill="#ffffff" stroke="#8aa3b8" stroke-width="2"/>
  <text x="65" y="135" class="section">第一批：两个查询可以并行</text>

  <rect x="65" y="157" width="210" height="138" rx="8" fill="#eef5fb" stroke="#3979aa" stroke-width="2"/>
  <text x="84" y="187" class="label">assistant message #1</text>
  <text x="84" y="219" class="code">1  slow_lookup</text>
  <text x="84" y="247" class="code">2  fast_lookup</text>
  <text x="84" y="274" class="small">source order</text>

  <line x1="275" y1="226" x2="338" y2="226" class="arrow"/>
  <rect x="340" y="157" width="258" height="138" rx="8" fill="#e6f4ea" stroke="#4f9a67" stroke-width="2"/>
  <text x="361" y="187" class="label">Pi 批次 #1</text>
  <text x="361" y="218" class="code">start → validate → before</text>
  <text x="361" y="246" class="text">两个有效调用并行 execute</text>
  <text x="361" y="274" class="small">fast 先结束，slow 后结束</text>

  <line x1="598" y1="226" x2="658" y2="226" class="arrow"/>
  <rect x="660" y="157" width="270" height="138" rx="8" fill="#f2ecfb" stroke="#8268a8" stroke-width="2"/>
  <text x="681" y="187" class="label">两种结果顺序</text>
  <text x="681" y="218" class="small">实时 UI 完成事件</text>
  <text x="681" y="241" class="code">fast → slow</text>
  <text x="681" y="268" class="small">下一次请求的 transcript</text>
  <text x="681" y="291" class="code">slow → fast</text>

  <path d="M795 295 L795 397" class="arrow"/>
  <text x="816" y="355" class="small">模型读取第一批结果</text>

  <rect x="40" y="410" width="920" height="162" rx="8" fill="#ffffff" stroke="#8aa3b8" stroke-width="2"/>
  <text x="65" y="442" class="section">第二批：审计继续执行，受限查询被策略阻止</text>

  <rect x="65" y="464" width="225" height="78" rx="8" fill="#eef5fb" stroke="#3979aa" stroke-width="2"/>
  <text x="84" y="486" class="label">assistant message #2</text>
  <text x="84" y="512" class="code">1  serial_audit</text>
  <text x="84" y="535" class="code">2  blocked_lookup</text>

  <line x1="290" y1="503" x2="348" y2="503" class="arrow"/>
  <rect x="350" y="464" width="268" height="78" rx="8" fill="#fff6d8" stroke="#c99824" stroke-width="2"/>
  <text x="370" y="490" class="code">serial_audit: execute → after</text>
  <text x="370" y="517" class="code">blocked_lookup: before → block</text>

  <line x1="618" y1="503" x2="676" y2="503" class="arrow"/>
  <rect x="678" y="464" width="252" height="78" rx="8" fill="#fce9e7" stroke="#bc5b52" stroke-width="2"/>
  <text x="698" y="490" class="code">toolResult: audit → blocked</text>
  <text x="698" y="517" class="small">blocked 是 isError=true，未执行</text>

  <rect x="40" y="592" width="920" height="62" rx="8" fill="#e8f4fa" stroke="#4894b5" stroke-width="2"/>
  <text x="61" y="618" class="text">同批才会互相影响：同一批含 <tspan class="code">executionMode="sequential"</tspan> 时，整批有效调用串行。</text>
  <text x="61" y="642" class="text">对照测试专门验证它；只有全批 result 都 <tspan class="code">terminate=true</tspan>，Agent 才停止下一次模型请求。</text>
</svg>
