<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">一次 Pi 模型请求的两种读取结果</title>
  <desc id="desc">streamSimple 只发起一次模型请求。Provider 将事件推入 AssistantMessageEventStream；for await 实时读取 text_delta，终止的 done message 同时让 result 返回完整 AssistantMessage。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="960" height="560" fill="#f8fafc"/>
  <rect width="960" height="64" fill="#1d4ed8"/>
  <text x="480" y="40" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">一次请求，不必自己拼两份结果</text>

  <rect x="54" y="90" width="240" height="92" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="174" y="122" text-anchor="middle" fill="#1e3a8a" font-size="17" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">streamSimple(...)</text>
  <text x="174" y="151" text-anchor="middle" fill="#475569" font-size="13" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">用户消息 + 模型配置</text>
  <text x="174" y="172" text-anchor="middle" fill="#475569" font-size="13" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">只发起一次网络请求</text>

  <path d="M294 136 H370" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="382" y="90" width="196" height="92" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="480" y="125" text-anchor="middle" fill="#9a3412" font-size="17" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">Provider</text>
  <text x="480" y="151" text-anchor="middle" fill="#475569" font-size="13" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">接收模型响应</text>
  <text x="480" y="172" text-anchor="middle" fill="#475569" font-size="13" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">持续推入标准事件</text>

  <path d="M578 136 H654" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="666" y="90" width="240" height="92" rx="6" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="786" y="124" text-anchor="middle" fill="#155e75" font-size="16" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">EventStream</text>
  <text x="786" y="151" text-anchor="middle" fill="#475569" font-size="13" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">一列事件 + 一个最终 Promise</text>
  <text x="786" y="172" text-anchor="middle" fill="#475569" font-size="13" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">不是第二次模型调用</text>

  <rect x="103" y="230" width="754" height="95" rx="6" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
  <text x="480" y="260" text-anchor="middle" fill="#115e59" font-size="15" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">Provider 推入的一条事件序列</text>
  <text x="480" y="297" text-anchor="middle" fill="#334155" font-size="15" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">start → text_start → text_delta → text_delta → text_end → done(message)</text>

  <path d="M321 325 V388 H225" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M639 325 V388 H735" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="52" y="388" width="346" height="122" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="225" y="420" text-anchor="middle" fill="#1e3a8a" font-size="16" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">for await (const event of stream)</text>
  <text x="225" y="451" text-anchor="middle" fill="#334155" font-size="14" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">按到达顺序读取每个事件</text>
  <text x="225" y="480" text-anchor="middle" fill="#1e3a8a" font-size="14" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">读到 text_delta 就立刻更新 UI</text>

  <rect x="562" y="388" width="346" height="122" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="735" y="420" text-anchor="middle" fill="#166534" font-size="16" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">await stream.result()</text>
  <text x="735" y="451" text-anchor="middle" fill="#334155" font-size="14" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">done(message) 到达时兑现 Promise</text>
  <text x="735" y="480" text-anchor="middle" fill="#166534" font-size="14" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">得到完整 AssistantMessage，用于保存</text>

  <text x="480" y="542" text-anchor="middle" fill="#64748b" font-size="13" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">事件回答“现在显示什么”；终止消息回答“最后保存什么”。</text>
</svg>
