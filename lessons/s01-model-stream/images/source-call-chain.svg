<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">从课程 code.ts 到 Pi 源码的调用链</title>
  <desc id="desc">课程代码通过 createModels 和 streamSimple 使用公开 API。ModelsImpl 根据模型的 provider 找到 Provider，Provider 产生标准化事件；EventStream 将事件提供给异步迭代，并在终止事件到达时兑现最终 Promise。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="960" height="500" fill="#f8fafc"/>
  <rect width="960" height="62" fill="#334155"/>
  <text x="480" y="39" text-anchor="middle" fill="#ffffff" font-size="21" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">从课程 code.ts 到 Pi 源码的调用链</text>

  <rect x="44" y="110" width="196" height="126" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="142" y="140" text-anchor="middle" fill="#1e3a8a" font-size="12" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">lessons/s01-model-stream/</text>
  <text x="142" y="158" text-anchor="middle" fill="#1e3a8a" font-size="14" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">code.ts</text>
  <text x="142" y="184" text-anchor="middle" fill="#475569" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">createModels()</text>
  <text x="142" y="208" text-anchor="middle" fill="#475569" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">streamSimple(model, context)</text>
  <text x="142" y="226" text-anchor="middle" fill="#64748b" font-size="11" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">只使用公开 package export</text>

  <path d="M240 173 H300" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="312" y="110" width="202" height="126" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <text x="413" y="140" text-anchor="middle" fill="#5b21b6" font-size="13" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">packages/ai/src/</text>
  <text x="413" y="158" text-anchor="middle" fill="#5b21b6" font-size="14" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">models.ts</text>
  <text x="413" y="184" text-anchor="middle" fill="#475569" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">ModelsImpl.streamSimple()</text>
  <text x="413" y="207" text-anchor="middle" fill="#475569" font-size="12" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">按 model.provider 找到 Provider</text>
  <text x="413" y="226" text-anchor="middle" fill="#64748b" font-size="11" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">延迟装配 Provider 的 Stream</text>

  <path d="M514 173 H574" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="586" y="110" width="164" height="126" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="668" y="145" text-anchor="middle" fill="#9a3412" font-size="16" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">Provider API</text>
  <text x="668" y="178" text-anchor="middle" fill="#475569" font-size="13" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">供应商响应</text>
  <text x="668" y="202" text-anchor="middle" fill="#475569" font-size="13" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">标准化为 Pi 事件</text>
  <text x="668" y="224" text-anchor="middle" fill="#64748b" font-size="12" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">本课使用 Anthropic Messages</text>

  <path d="M750 173 H810" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="822" y="110" width="98" height="126" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="871" y="154" text-anchor="middle" fill="#166534" font-size="15" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">事件流</text>
  <text x="871" y="181" text-anchor="middle" fill="#475569" font-size="12" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">text_delta</text>
  <text x="871" y="204" text-anchor="middle" fill="#475569" font-size="12" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">done(message)</text>

  <path d="M871 236 V303" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="208" y="316" width="544" height="124" rx="6" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
  <text x="480" y="350" text-anchor="middle" fill="#115e59" font-size="17" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">packages/ai/src/utils/event-stream.ts</text>
  <line x1="480" y1="367" x2="480" y2="414" stroke="#cbd5e1" stroke-width="2"/>
  <text x="344" y="389" text-anchor="middle" fill="#155e75" font-size="15" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">for await...of</text>
  <text x="344" y="414" text-anchor="middle" fill="#475569" font-size="13" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">从队列持续读取事件</text>
  <text x="616" y="389" text-anchor="middle" fill="#166534" font-size="15" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">result()</text>
  <text x="616" y="414" text-anchor="middle" fill="#475569" font-size="13" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">done 兑现最终 Promise</text>

  <text x="480" y="475" text-anchor="middle" fill="#64748b" font-size="13" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">推荐阅读顺序：先读课程 code.ts 的五步，再沿箭头进入固定 commit 的上游实现。</text>
</svg>
