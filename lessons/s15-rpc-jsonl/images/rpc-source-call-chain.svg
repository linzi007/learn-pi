<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Learn Pi s15 到 Pi RPC 源码调用链</title>
  <desc id="desc">上半部分展示 code.ts 使用公开 RpcClient 启动 rpc-entry 子进程。中间展示命令通过严格 JSONL 到达 runRpcMode 和 AgentSession。下半部分展示 stdout 记录回到 RpcClient 后，响应进入 pendingRequests，事件进入 eventListeners。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .section { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .node { font: 700 16px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #172033; }
      .desc { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #536076; }
      .badge { font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .arrow-label { font: 600 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #334155; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="#f8fafc"/>
  <text x="600" y="47" text-anchor="middle" class="title">从 code.ts 到 runRpcMode：真实 RPC 往返链路</text>

  <text x="48" y="90" class="section">1. 启动独立 Pi 进程</text>
  <line x1="48" y1="101" x2="1152" y2="101" stroke="#cbd5e1" stroke-width="2"/>

  <rect x="55" y="126" width="245" height="104" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <rect x="72" y="141" width="66" height="22" rx="5" fill="#ffedd5"/>
  <text x="105" y="157" text-anchor="middle" class="badge" fill="#c2410c">课程代码</text>
  <text x="177" y="190" text-anchor="middle" class="node">code.ts</text>
  <text x="177" y="212" text-anchor="middle" class="desc">new RpcClient(options)</text>

  <rect x="355" y="126" width="245" height="104" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <rect x="372" y="141" width="66" height="22" rx="5" fill="#e2e8f0"/>
  <text x="405" y="157" text-anchor="middle" class="badge" fill="#475569">公开 API</text>
  <text x="477" y="190" text-anchor="middle" class="node">RpcClient.start()</text>
  <text x="477" y="212" text-anchor="middle" class="desc">spawn("node", [cliPath, ...])</text>

  <rect x="655" y="126" width="220" height="104" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <rect x="672" y="141" width="78" height="22" rx="5" fill="#dbeafe"/>
  <text x="711" y="157" text-anchor="middle" class="badge" fill="#1d4ed8">公开 export</text>
  <text x="765" y="190" text-anchor="middle" class="node">rpc-entry</text>
  <text x="765" y="212" text-anchor="middle" class="desc">main(["--mode", "rpc"])</text>

  <rect x="930" y="126" width="220" height="104" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <rect x="947" y="141" width="66" height="22" rx="5" fill="#dcfce7"/>
  <text x="980" y="157" text-anchor="middle" class="badge" fill="#15803d">真实实现</text>
  <text x="1040" y="190" text-anchor="middle" class="node">runRpcMode(runtime)</text>
  <text x="1040" y="212" text-anchor="middle" class="desc">接管 stdin / stdout</text>

  <path d="M300 178 H347" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M600 178 H647" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M875 178 H922" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text x="48" y="285" class="section">2. command：宿主写入，Pi 处理</text>
  <line x1="48" y1="296" x2="1152" y2="296" stroke="#cbd5e1" stroke-width="2"/>

  <rect x="55" y="324" width="200" height="104" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="155" y="365" text-anchor="middle" class="node">RpcClient.send()</text>
  <text x="155" y="389" text-anchor="middle" class="desc">id = req_N</text>
  <text x="155" y="408" text-anchor="middle" class="desc">登记 pending Promise</text>

  <rect x="305" y="324" width="200" height="104" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="405" y="365" text-anchor="middle" class="node">serializeJsonLine()</text>
  <text x="405" y="389" text-anchor="middle" class="desc">JSON.stringify(value) + LF</text>
  <text x="405" y="408" text-anchor="middle" class="desc">stdin.write(line)</text>

  <rect x="555" y="324" width="200" height="104" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="655" y="365" text-anchor="middle" class="node">attachJsonlLineReader</text>
  <text x="655" y="389" text-anchor="middle" class="desc">只按 LF 切分 stdin</text>
  <text x="655" y="408" text-anchor="middle" class="desc">JSON.parse(line)</text>

  <rect x="805" y="324" width="160" height="104" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="885" y="365" text-anchor="middle" class="node">handleCommand</text>
  <text x="885" y="389" text-anchor="middle" class="desc">switch(type)</text>
  <text x="885" y="408" text-anchor="middle" class="desc">调用 Session</text>

  <rect x="1015" y="324" width="135" height="104" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="1082" y="365" text-anchor="middle" class="node">response</text>
  <text x="1082" y="389" text-anchor="middle" class="desc">保留 id</text>
  <text x="1082" y="408" text-anchor="middle" class="desc">success/error</text>

  <path d="M255 376 H297" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M505 376 H547" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M755 376 H797" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M965 376 H1007" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text x="48" y="484" class="section">3. stdout：同一 reader 将响应和事件送回不同出口</text>
  <line x1="48" y1="495" x2="1152" y2="495" stroke="#cbd5e1" stroke-width="2"/>

  <rect x="55" y="525" width="210" height="112" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="160" y="562" text-anchor="middle" class="node">runRpcMode.output()</text>
  <text x="160" y="586" text-anchor="middle" class="desc">response 或 AgentSessionEvent</text>
  <text x="160" y="607" text-anchor="middle" class="desc">writeRawStdout(JSONL)</text>

  <rect x="320" y="525" width="225" height="112" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="432" y="562" text-anchor="middle" class="node">attachJsonlLineReader</text>
  <text x="432" y="586" text-anchor="middle" class="desc">RpcClient 读取 child stdout</text>
  <text x="432" y="607" text-anchor="middle" class="desc">一条 LF 记录进入 handleLine</text>

  <polygon points="675,525 770,581 675,637 580,581" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="675" y="572" text-anchor="middle" class="desc">response 且 id</text>
  <text x="675" y="592" text-anchor="middle" class="desc">匹配 pending?</text>

  <rect x="825" y="515" width="325" height="74" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="987" y="547" text-anchor="middle" class="node">pending.resolve(response)</text>
  <text x="987" y="570" text-anchor="middle" class="desc">完成 getState / setModel 等 Promise</text>

  <rect x="825" y="609" width="325" height="74" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="987" y="641" text-anchor="middle" class="node">listener(event)</text>
  <text x="987" y="664" text-anchor="middle" class="desc">collectEvents 等待 agent_settled</text>

  <path d="M265 581 H312" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M545 581 H572" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M770 557 H817" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M675 637 V646 H817" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="782" y="548" class="arrow-label" fill="#15803d">是</text>
  <text x="688" y="660" class="arrow-label" fill="#1d4ed8">否</text>

  <rect x="175" y="708" width="850" height="34" rx="6" fill="#172033"/>
  <text x="600" y="731" text-anchor="middle" style="font: 600 15px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #ffffff;">课程只负责装配与观察；子进程、协议、关联表和事件源全部来自 Pi 公开实现</text>
</svg>
