<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="850" viewBox="0 0 1200 850" role="img" aria-labelledby="title desc">
  <title id="title">Pi RPC JSONL 请求关联与事件分流</title>
  <desc id="desc">宿主进程同时发送带不同请求 ID 的状态和模型命令。Pi 子进程在同一条标准输出中返回响应和 Agent 事件。图中 req 2 先返回是可能的交错示意，实际顺序由命令耗时决定。RpcClient 根据记录是否为带匹配 ID 的 response，决定完成对应 Promise 或广播事件。</desc>
  <defs>
    <marker id="arrow-dark" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ea580c"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <style>
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .subtitle { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #536076; }
      .section { font: 700 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .label { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .body { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .mono { font: 600 14px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #172033; }
      .small { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #536076; }
    </style>
  </defs>

  <rect width="1200" height="850" fill="#f8fafc"/>
  <text x="600" y="46" text-anchor="middle" class="title">一条 stdout，怎样同时承载并发响应和 Agent 事件</text>
  <text x="600" y="76" text-anchor="middle" class="subtitle">严格 JSONL 负责分帧，request id 负责关联，record type 负责分流</text>
  <text x="600" y="97" text-anchor="middle" class="small">绿色箭头展示一种可能的乱序返回；实际先后由命令耗时决定</text>

  <rect x="50" y="112" width="360" height="420" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <rect x="50" y="112" width="360" height="52" rx="8" fill="#e2e8f0"/>
  <path d="M50 156 H410" stroke="#64748b" stroke-width="2"/>
  <text x="230" y="145" text-anchor="middle" class="section">宿主进程：RpcClient</text>

  <text x="78" y="197" class="label">同时发出</text>
  <rect x="78" y="214" width="304" height="42" rx="6" fill="#fff7ed" stroke="#f97316"/>
  <text x="94" y="240" class="mono">req_1  get_state</text>
  <rect x="78" y="268" width="304" height="42" rx="6" fill="#fff7ed" stroke="#f97316"/>
  <text x="94" y="294" class="mono">req_2  get_available_models</text>

  <text x="78" y="344" class="label">等待中的 Promise</text>
  <rect x="78" y="360" width="304" height="78" rx="6" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="94" y="389" class="mono">pendingRequests</text>
  <text x="110" y="416" class="mono">req_1 → resolve(state)</text>
  <text x="110" y="434" class="mono">req_2 → resolve(models)</text>

  <rect x="78" y="462" width="304" height="44" rx="6" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="230" y="490" text-anchor="middle" class="label">eventListeners：持续更新宿主 UI</text>

  <rect x="790" y="112" width="360" height="420" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <rect x="790" y="112" width="360" height="52" rx="8" fill="#dbeafe"/>
  <path d="M790 156 H1150" stroke="#64748b" stroke-width="2"/>
  <text x="970" y="145" text-anchor="middle" class="section">Pi RPC 子进程</text>

  <rect x="818" y="190" width="304" height="58" rx="6" fill="#f1f5f9" stroke="#64748b"/>
  <text x="970" y="216" text-anchor="middle" class="mono">rpc-entry → runRpcMode()</text>
  <text x="970" y="236" text-anchor="middle" class="small">读取 stdin 中每一条 LF 分隔记录</text>

  <rect x="818" y="277" width="304" height="58" rx="6" fill="#fefce8" stroke="#ca8a04"/>
  <text x="970" y="304" text-anchor="middle" class="label">handleCommand(command)</text>
  <text x="970" y="324" text-anchor="middle" class="small">操作同一个 AgentSessionRuntime</text>

  <rect x="818" y="364" width="304" height="62" rx="6" fill="#ecfdf5" stroke="#16a34a"/>
  <text x="970" y="390" text-anchor="middle" class="mono">response + 原 request id</text>
  <text x="970" y="412" text-anchor="middle" class="small">success data 或 error</text>

  <rect x="818" y="448" width="304" height="58" rx="6" fill="#eff6ff" stroke="#2563eb"/>
  <text x="970" y="475" text-anchor="middle" class="mono">AgentSessionEvent</text>
  <text x="970" y="496" text-anchor="middle" class="small">agent_start ... agent_settled</text>

  <path d="M410 238 H775" fill="none" stroke="#ea580c" stroke-width="3" marker-end="url(#arrow-orange)"/>
  <text x="600" y="218" text-anchor="middle" class="mono">stdin: { id: "req_1", type: "get_state" }\n</text>
  <path d="M410 292 H775" fill="none" stroke="#ea580c" stroke-width="3" marker-end="url(#arrow-orange)"/>
  <text x="600" y="276" text-anchor="middle" class="mono">stdin: { id: "req_2", ... }\n</text>

  <path d="M790 390 H425" fill="none" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow-green)"/>
  <text x="600" y="375" text-anchor="middle" class="mono">stdout: response(id="req_2")\n</text>
  <path d="M790 430 H425" fill="none" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow-green)"/>
  <text x="600" y="456" text-anchor="middle" class="mono">stdout: response(id="req_1")\n</text>

  <path d="M790 488 H425" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="600" y="512" text-anchor="middle" class="mono">stdout: message_update / agent_settled\n</text>

  <rect x="115" y="582" width="970" height="190" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="600" y="610" text-anchor="middle" class="section">RpcClient.handleLine(line) 的分流判断</text>
  <rect x="158" y="632" width="300" height="48" rx="6" fill="#f1f5f9" stroke="#64748b"/>
  <text x="308" y="661" text-anchor="middle" class="mono">JSON.parse(一条 LF 记录)</text>
  <path d="M458 656 H510" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow-dark)"/>
  <polygon points="600,622 690,656 600,690 510,656" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="600" y="651" text-anchor="middle" class="small">response 且 id</text>
  <text x="600" y="668" text-anchor="middle" class="small">存在于 pending?</text>
  <path d="M690 646 H738" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <rect x="738" y="622" width="300" height="48" rx="6" fill="#ecfdf5" stroke="#16a34a"/>
  <text x="888" y="651" text-anchor="middle" class="label">是：完成对应 Promise</text>
  <path d="M600 690 V724 H738" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <rect x="738" y="704" width="300" height="48" rx="6" fill="#eff6ff" stroke="#2563eb"/>
  <text x="888" y="733" text-anchor="middle" class="label">否：广播给事件监听器</text>
  <text x="705" y="642" class="small" fill="#15803d">是</text>
  <text x="614" y="718" class="small" fill="#1d4ed8">否</text>

  <rect x="180" y="796" width="840" height="34" rx="6" fill="#172033"/>
  <text x="600" y="819" text-anchor="middle" style="font: 600 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #ffffff;">响应可以乱序，事件可以穿插；只要分帧和分流规则不变，宿主就不会串线</text>
</svg>
