<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Pi 平稳停止的生命周期</title>
  <desc id="desc">Agent 在收到首个文字增量后请求中止，模型流返回 aborted 结束消息，Pi 仍会发送 turn_end 和 agent_end，最后在 waitForIdle 后清理运行状态。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 26px -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif; fill: #ffffff; }
      .label { font: 700 17px -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif; fill: #172033; }
      .body { font: 500 15px -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif; fill: #475569; }
      .code { font: 600 15px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #334155; }
      .small { font: 500 14px -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif; fill: #64748b; }
    </style>
  </defs>
  <rect width="960" height="540" fill="#f8fafc"/>
  <rect width="960" height="72" fill="#155e75"/>
  <text x="480" y="45" text-anchor="middle" class="title">一次中止也必须有完整结尾</text>

  <path d="M155 236 H202" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M340 236 H387" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M525 236 H572" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M710 236 H757" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="25" y="160" width="130" height="150" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="90" y="196" text-anchor="middle" class="label">开始运行</text>
  <text x="90" y="227" text-anchor="middle" class="code">prompt()</text>
  <text x="90" y="260" text-anchor="middle" class="body">isStreaming</text>
  <text x="90" y="282" text-anchor="middle" class="body">变为 true</text>

  <rect x="210" y="160" width="130" height="150" rx="8" fill="#cffafe" stroke="#0891b2" stroke-width="2"/>
  <text x="275" y="196" text-anchor="middle" class="label">文字增量</text>
  <text x="275" y="227" text-anchor="middle" class="code">text_delta</text>
  <text x="275" y="260" text-anchor="middle" class="body">仍在生成</text>
  <text x="275" y="282" text-anchor="middle" class="body">可观察进度</text>

  <rect x="395" y="160" width="130" height="150" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="460" y="196" text-anchor="middle" class="label">请求中止</text>
  <text x="460" y="227" text-anchor="middle" class="code">abort()</text>
  <text x="460" y="260" text-anchor="middle" class="body">只触发</text>
  <text x="460" y="282" text-anchor="middle" class="body">AbortSignal</text>

  <rect x="580" y="160" width="130" height="150" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="645" y="196" text-anchor="middle" class="label">收束事件</text>
  <text x="645" y="227" text-anchor="middle" class="code">aborted</text>
  <text x="645" y="260" text-anchor="middle" class="body">turn_end</text>
  <text x="645" y="282" text-anchor="middle" class="body">agent_end</text>

  <rect x="765" y="160" width="130" height="150" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="830" y="196" text-anchor="middle" class="label">空闲</text>
  <text x="830" y="227" text-anchor="middle" class="code">idle</text>
  <text x="830" y="260" text-anchor="middle" class="body">状态清理</text>
  <text x="830" y="282" text-anchor="middle" class="body">可再提问</text>

  <rect x="125" y="365" width="710" height="110" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="480" y="403" text-anchor="middle" class="label">不要把 agent_end 当成已经 idle</text>
  <text x="480" y="432" text-anchor="middle" class="body">agent_end 表示循环不再发新事件；waitForIdle() 才等待监听器完成。</text>
  <text x="480" y="458" text-anchor="middle" class="body">之后 Pi 才清理 isStreaming、signal 和本次运行状态。</text>
</svg>
