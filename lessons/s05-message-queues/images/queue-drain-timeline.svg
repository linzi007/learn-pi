<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="820" viewBox="0 0 1360 820" role="img" aria-labelledby="title desc">
  <title id="title">Pi steering 与 follow-up 消息队列的取出时间线</title>
  <desc id="desc">首个助手回复开始后，用户分别排入引导消息和后续消息。Pi 完成当前助手回合及工具处理后先取出引导消息；只有没有工具调用和引导消息时，才取出后续消息。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#46607a"/>
    </marker>
    <style>
      .title { font: 700 29px system-ui, sans-serif; fill: #17202a; }
      .subtitle { font: 400 16px system-ui, sans-serif; fill: #52616f; }
      .label { font: 700 17px system-ui, sans-serif; fill: #17202a; }
      .text { font: 400 15px system-ui, sans-serif; fill: #2c3e50; }
      .small { font: 400 13px system-ui, sans-serif; fill: #405264; }
      .code { font: 600 14px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #1f3b4d; }
      .white { font: 700 15px system-ui, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect width="1360" height="820" fill="#f7fafc"/>
  <text x="52" y="52" class="title">两条排队消息，不共用同一个取出时机</text>
  <text x="52" y="80" class="subtitle">运行中的消息不会插进正在生成的回复：Pi 在明确的 drain point 取出，再发起下一次模型请求。</text>

  <rect x="52" y="116" width="192" height="90" rx="8" fill="#e6f4ea" stroke="#4f9a67" stroke-width="2"/>
  <text x="73" y="150" class="label">初始问题</text>
  <text x="73" y="180" class="code">agent.prompt(...)</text>
  <line x1="244" y1="161" x2="310" y2="161" stroke="#46607a" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="312" y="111" width="264" height="100" rx="8" fill="#eaf2fb" stroke="#3979aa" stroke-width="2"/>
  <text x="334" y="147" class="label">第 1 次助手回复</text>
  <text x="334" y="177" class="small">正在流式生成</text>
  <text x="334" y="198" class="small">当前回合尚未结束</text>

  <rect x="650" y="110" width="276" height="104" rx="8" fill="#fff4d6" stroke="#c99824" stroke-width="2"/>
  <text x="673" y="145" class="label">引导消息队列</text>
  <text x="673" y="175" class="code">agent.steer(...)</text>
  <text x="673" y="199" class="small">希望调整正在进行的任务</text>

  <rect x="996" y="110" width="296" height="104" rx="8" fill="#fcecf4" stroke="#bd5b86" stroke-width="2"/>
  <text x="1019" y="145" class="label">后续消息队列</text>
  <text x="1019" y="175" class="code">agent.followUp(...)</text>
  <text x="1019" y="199" class="small">愿意等当前任务自然结束</text>

  <path d="M442 211 V260 H786 V214" fill="none" stroke="#c99824" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="491" y="249" class="small">助手回复开始后，用户可以分别排入两条消息</text>
  <path d="M442 211 V280 H1144 V214" fill="none" stroke="#bd5b86" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="312" y="320" width="980" height="92" rx="8" fill="#ffffff" stroke="#8aa3b8" stroke-width="2"/>
  <text x="342" y="355" class="label">当前回合收束</text>
  <text x="342" y="383" class="small">完整助手回复结束；若有工具调用，先执行完这批工具并写入结果。这里不是中断点，也不会撤销已完成的工作。</text>

  <path d="M794 214 V320" fill="none" stroke="#46607a" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1144 214 V288 H1120 V320" fill="none" stroke="#46607a" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="480" y="467" width="644" height="104" rx="8" fill="#fff4d6" stroke="#c99824" stroke-width="2"/>
  <text x="510" y="504" class="label">第一个取出点：引导消息（steering）</text>
  <text x="510" y="534" class="small">当前助手回合和工具处理结束后，优先取出最早的一条引导消息。</text>
  <text x="510" y="557" class="small">它成为下一次模型请求前的新 user message。</text>
  <line x1="802" y1="412" x2="802" y2="467" stroke="#46607a" stroke-width="3" marker-end="url(#arrow)"/>

  <line x1="480" y1="519" x2="364" y2="519" stroke="#46607a" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="70" y="467" width="292" height="104" rx="8" fill="#eaf2fb" stroke="#3979aa" stroke-width="2"/>
  <text x="94" y="504" class="label">第 2 次助手回复</text>
  <text x="94" y="535" class="small">模型已看到引导消息</text>
  <text x="94" y="557" class="small">继续完成调整后的任务</text>

  <path d="M216 571 V642 H618" fill="none" stroke="#46607a" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="620" y="602" width="672" height="110" rx="8" fill="#fcecf4" stroke="#bd5b86" stroke-width="2"/>
  <text x="650" y="639" class="label">第二个取出点：后续消息（follow-up）</text>
  <text x="650" y="669" class="small">只有没有工具调用、也没有待取的引导消息，Agent 本来要停止时才取出。</text>
  <text x="650" y="692" class="small">它不会抢在引导消息前面，也不会打断第 1 次或第 2 次回复。</text>

  <line x1="956" y1="712" x2="956" y2="755" stroke="#46607a" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="782" y="756" width="348" height="48" rx="8" fill="#eaf2fb" stroke="#3979aa" stroke-width="2"/>
  <text x="956" y="787" text-anchor="middle" class="label">第 3 次助手回复：处理后续请求</text>

  <rect x="52" y="724" width="512" height="72" rx="8" fill="#fef2f2" stroke="#d76a6a" stroke-width="2"/>
  <text x="74" y="752" class="label">不是“立刻插话”</text>
  <text x="74" y="777" class="small">steering 改变的是下一次请求的输入，不会取消当前模型流或跳过当前工具。</text>
</svg>
