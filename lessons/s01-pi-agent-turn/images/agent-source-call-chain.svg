<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">从 s01 教学代码到 Pi Agent 的运行链</title>
  <desc id="desc">课程代码调用 Agent prompt 并订阅事件。Pi Agent 的生命周期控制器启动 Agent Loop，循环调用模型并处理消息；事件处理器先更新状态，再通知订阅者。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="960" height="500" fill="#f8fafc"/>
  <rect width="960" height="62" fill="#334155"/>
  <text x="480" y="39" text-anchor="middle" fill="#ffffff" font-size="21" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">从 s01 教学代码到 Pi Agent 的运行链</text>

  <rect x="48" y="112" width="192" height="132" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="144" y="144" text-anchor="middle" fill="#1e3a8a" font-size="13" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">lessons/s01-*/code.ts</text>
  <text x="144" y="178" text-anchor="middle" fill="#334155" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">readline 读取问题</text>
  <text x="144" y="204" text-anchor="middle" fill="#334155" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">agent.prompt(question)</text>
  <text x="144" y="228" text-anchor="middle" fill="#64748b" font-size="12" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">subscribe() 显示事件</text>

  <path d="M240 178 H302" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="314" y="112" width="190" height="132" rx="6" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="409" y="145" text-anchor="middle" fill="#155e75" font-size="16" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Agent.prompt()</text>
  <text x="409" y="177" text-anchor="middle" fill="#334155" font-size="13" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">开始一轮运行</text>
  <text x="409" y="202" text-anchor="middle" fill="#334155" font-size="13" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">保留 Agent 状态</text>
  <text x="409" y="226" text-anchor="middle" fill="#64748b" font-size="12" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">公开 API</text>

  <path d="M504 178 H566" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="578" y="112" width="170" height="132" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="663" y="145" text-anchor="middle" fill="#9a3412" font-size="15" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">runWithLifecycle()</text>
  <text x="663" y="177" text-anchor="middle" fill="#334155" font-size="13" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">启动、收束一轮运行</text>
  <text x="663" y="202" text-anchor="middle" fill="#334155" font-size="13" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">等待监听器完成</text>
  <text x="663" y="226" text-anchor="middle" fill="#64748b" font-size="12" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">内部实现</text>

  <path d="M748 178 H810" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="822" y="112" width="92" height="132" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="868" y="145" text-anchor="middle" fill="#166534" font-size="14" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">Agent Loop</text>
  <text x="868" y="178" text-anchor="middle" fill="#475569" font-size="12" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">调用模型</text>
  <text x="868" y="202" text-anchor="middle" fill="#475569" font-size="12" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">处理消息</text>

  <path d="M868 244 V303" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="218" y="316" width="524" height="116" rx="6" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
  <text x="480" y="349" text-anchor="middle" fill="#115e59" font-size="17" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">processEvents()</text>
  <text x="480" y="381" text-anchor="middle" fill="#334155" font-size="14" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">先更新 Agent 状态，再通知 subscribe() listener</text>
  <text x="480" y="408" text-anchor="middle" fill="#155e75" font-size="14" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">教学终端只显示 agent_start、text_delta、agent_end</text>

  <text x="480" y="475" text-anchor="middle" fill="#64748b" font-size="13" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">s01 先观察一轮运行；s02 再打开“事件如何变成状态”的细节。</text>
</svg>
