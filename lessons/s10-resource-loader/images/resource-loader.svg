<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title description">
  <title id="title">Pi ResourceLoader 的范围、优先级和诊断</title>
  <desc id="description">临时 agent 配置、父目录和子项目提供上下文文件、技能和提示词。ResourceLoader 按规则合并、记录同名碰撞并输出可用资源。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f5f8b"/>
    </marker>
    <style>
      .title { font: 700 30px 'PingFang SC', 'Noto Sans CJK SC', Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 18px 'PingFang SC', 'Noto Sans CJK SC', Arial, sans-serif; fill: #536273; }
      .panel { font: 700 20px 'PingFang SC', 'Noto Sans CJK SC', Arial, sans-serif; fill: #172033; }
      .label { font: 600 16px 'PingFang SC', 'Noto Sans CJK SC', Arial, sans-serif; fill: #172033; }
      .small { font: 400 14px 'PingFang SC', 'Noto Sans CJK SC', Arial, sans-serif; fill: #415267; }
      .arrow-label { font: 600 16px 'PingFang SC', 'Noto Sans CJK SC', Arial, sans-serif; fill: #1f5f8b; }
      .result { font: 700 18px 'PingFang SC', 'Noto Sans CJK SC', Arial, sans-serif; fill: #14532d; }
    </style>
  </defs>

  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="600" y="56" text-anchor="middle" class="title">资源加载器（ResourceLoader）：按范围发现，按优先级保留，并留下诊断</text>
  <text x="600" y="88" text-anchor="middle" class="subtitle">本图对应 s10 的临时项目目录，不读取用户目录或全局 Pi 状态</text>

  <rect x="42" y="138" width="362" height="476" rx="8" fill="#ffffff" stroke="#96a8bb" stroke-width="2"/>
  <text x="223" y="178" text-anchor="middle" class="panel">临时资源范围</text>
  <text x="223" y="205" text-anchor="middle" class="small">同名资源的来源顺序可被观察</text>
  <rect x="72" y="236" width="302" height="74" rx="6" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="223" y="265" text-anchor="middle" class="label">agentDir（用户范围）</text>
  <text x="223" y="290" text-anchor="middle" class="small">AGENTS · inspect Skill · /review</text>
  <rect x="72" y="330" width="302" height="60" rx="6" fill="#ede9fe" stroke="#a78bfa"/>
  <text x="223" y="357" text-anchor="middle" class="label">父项目目录</text>
  <text x="223" y="379" text-anchor="middle" class="small">AGENTS</text>
  <rect x="72" y="410" width="302" height="136" rx="6" fill="#dcfce7" stroke="#4ade80"/>
  <text x="223" y="439" text-anchor="middle" class="label">子项目 .pi（项目范围）</text>
  <text x="223" y="467" text-anchor="middle" class="small">AGENTS · 同名 inspect · manual Skill</text>
  <text x="223" y="491" text-anchor="middle" class="small">坏 frontmatter · 同名 /review</text>
  <rect x="72" y="562" width="302" height="32" rx="5" fill="#fff1f2" stroke="#fb7185"/>
  <text x="223" y="583" text-anchor="middle" class="small">同名与格式错误不会静默消失</text>

  <line x1="420" y1="378" x2="532" y2="378" stroke="#1f5f8b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="476" y="344" text-anchor="middle" class="arrow-label">发现与合并</text>
  <text x="476" y="367" text-anchor="middle" class="small">范围、顺序、诊断</text>

  <rect x="548" y="183" width="250" height="390" rx="8" fill="#ffffff" stroke="#96a8bb" stroke-width="2"/>
  <text x="673" y="223" text-anchor="middle" class="panel">ResourceLoader</text>
  <rect x="578" y="254" width="190" height="56" rx="6" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="673" y="287" text-anchor="middle" class="label">上下文：外 -> 内</text>
  <rect x="578" y="328" width="190" height="56" rx="6" fill="#dcfce7" stroke="#4ade80"/>
  <text x="673" y="361" text-anchor="middle" class="label">同名：第一个胜出</text>
  <rect x="578" y="402" width="190" height="56" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="673" y="435" text-anchor="middle" class="label">碰撞：保留诊断</text>
  <rect x="578" y="476" width="190" height="56" rx="6" fill="#fee2e2" stroke="#fb7185"/>
  <text x="673" y="509" text-anchor="middle" class="label">禁用：跳过默认发现</text>

  <line x1="815" y1="378" x2="927" y2="378" stroke="#1f5f8b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="871" y="344" text-anchor="middle" class="arrow-label">公开结果</text>
  <text x="871" y="367" text-anchor="middle" class="small">给宿主或 AgentSession</text>

  <rect x="943" y="157" width="214" height="442" rx="8" fill="#ffffff" stroke="#96a8bb" stroke-width="2"/>
  <text x="1050" y="197" text-anchor="middle" class="panel">可用资源</text>
  <text x="1050" y="224" text-anchor="middle" class="small">读取结果，不等于模型调用</text>
  <rect x="970" y="256" width="160" height="66" rx="6" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="1050" y="284" text-anchor="middle" class="label">上下文文件</text>
  <text x="1050" y="307" text-anchor="middle" class="small">全局 -> 父 -> 子</text>
  <rect x="970" y="342" width="160" height="78" rx="6" fill="#dcfce7" stroke="#4ade80"/>
  <text x="1050" y="370" text-anchor="middle" class="label">Skills</text>
  <text x="1050" y="393" text-anchor="middle" class="small">inspect 可见</text>
  <text x="1050" y="412" text-anchor="middle" class="small">manual 仅显式调用</text>
  <rect x="970" y="440" width="160" height="66" rx="6" fill="#ede9fe" stroke="#a78bfa"/>
  <text x="1050" y="468" text-anchor="middle" class="label">Prompt Template</text>
  <text x="1050" y="491" text-anchor="middle" class="small">/review（第一个）</text>
  <rect x="970" y="526" width="160" height="46" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="1050" y="555" text-anchor="middle" class="label">diagnostics：可检查</text>

  <text x="600" y="678" text-anchor="middle" class="result">主规则：资源来源决定顺序，冲突不覆盖，禁用不等于清空显式允许的资源</text>
</svg>
